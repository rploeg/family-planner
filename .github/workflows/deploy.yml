name: Deploy to Windows Server

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Deploy Backend to Windows Server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.WINDOWS_SERVER_HOST }}
          username: ${{ secrets.WINDOWS_SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Navigate to repository directory
            cd C:\repo\family-planner
            
            # Pull latest changes
            git pull origin master
            
            # Install backend dependencies
            cd family-planner-backend
            npm install
            
            # Restart backend service
            pm2 restart family-planner-backend

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Build Frontend
        run: |
          cd family-planner
          npm ci
          npm run build
        env:
          REACT_APP_API_BASE_URL: http://${{ secrets.WINDOWS_SERVER_HOST }}:3002/api
      
      - name: Deploy Frontend to Windows Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.WINDOWS_SERVER_HOST }}
          username: ${{ secrets.WINDOWS_SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "family-planner/build/"
          target: "C:/repo/family-planner/family-planner/build/"
          strip_components: 2
          rm: true
      
      - name: Restart Frontend Service
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.WINDOWS_SERVER_HOST }}
          username: ${{ secrets.WINDOWS_SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Restart frontend service
            pm2 restart family-planner-frontend
            pm2 restart family-planner-frontend || pm2 serve C:\family-planner\frontend\build 3000 --name family-planner-frontend --spa
