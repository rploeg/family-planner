<svg width="32" height="32" xmlns="http://www.w3.org/2000/svg">
  <!-- Green rounded background -->
  <rect width="32" height="32" rx="5" fill="#4CAF50"/>
  
  <!-- Calendar body (white) -->
  <rect x="5" y="8" width="22" height="19" rx="2" fill="#ffffff"/>
  
  <!-- Calendar header (dark green) -->
  <rect x="5" y="5" width="22" height="8" rx="2" fill="#2E7D32"/>
  
  <!-- Calendar rings -->
  <rect x="9" y="6" width="3" height="5" fill="#ffffff"/>
  <rect x="20" y="6" width="3" height="5" fill="#ffffff"/>
  
  <!-- Grid lines -->
  <line x1="7" y1="14" x2="25" y2="14" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="7" y1="19" x2="25" y2="19" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="13" y1="11" x2="13" y2="25" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="19" y1="11" x2="19" y2="25" stroke="#E0E0E0" stroke-width="1"/>
  
  <!-- Checkmark -->
  <path d="M 9 17 L 11 19 L 15 15" stroke="#4CAF50" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
