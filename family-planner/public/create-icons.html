<!DOCTYPE html>
<html>
<head><title>Create Icons</title></head>
<body>
<canvas id="canvas152" width="152" height="152"></canvas>
<canvas id="canvas167" width="167" height="167"></canvas>
<canvas id="canvas180" width="180" height="180"></canvas>
<canvas id="canvas192" width="192" height="192"></canvas>
<canvas id="canvas512" width="512" height="512"></canvas>
<script>
const sizes = [152, 167, 180, 192, 512];
sizes.forEach(size => {
  const canvas = document.getElementById('canvas' + size);
  const ctx = canvas.getContext('2d');
  
  // Green background
  ctx.fillStyle = '#4CAF50';
  ctx.fillRect(0, 0, size, size);
  
  // White text
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold ' + (size/3) + 'px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('FP', size/2, size/2);
  
  // Download
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'icon-' + size + '.png';
    a.click();
  });
});
</script>
</body>
</html>
